<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Product Details</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script src="../js/product.js" type="module"></script>
  </head>

  <body>
    <header class="divider" id="main-header"></header>

    <!-- Breadcrumb -->
    <div class="breadcrumb-wrapper">
      <p class="breadcrumb" id="breadcrumb"></p>
    </div>

    <main class="divider">
      <section class="product-detail">
        <h3 id="productName"></h3>
        <h2 class="divider" id="productNameWithoutBrand"></h2>
        <img id="productImage" class="divider" src="" alt="" />
        <p class="product-card__price" id="productFinalPrice"></p>
        <p class="product__color" id="productColorName"></p>
        <p id="productDiscount"></p>
        <p class="product__description" id="productDescriptionHtmlSimple"></p>
        <div class="product-detail__add">
          <button id="addToCart" data-id="">Add to Cart</button>
        </div>
      </section>

      <section
        class="recommended-products"
        id="recommendedProductsSection"
        hidden
      >
        <h2>Other Gear to Consider</h2>
        <ul class="product-list recommended-products__list" id="recommendedProductsList"></ul>
      </section>
    </main>

    <footer id="main-footer"></footer>
  </body>
</html>
