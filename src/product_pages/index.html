<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Product Detail</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script src="../js/product.js" type="module"></script>
  </head>
  <body>
    <header class="divider" id="main-header"></header>

    <div class="breadcrumb-wrapper">
      <p class="breadcrumb" id="breadcrumb"></p>
    </div>

    <main class="divider">
      <section class="product-detail">
        <h3 id="productName"></h3>
        <h2 class="divider" id="productNameWithoutBrand"></h2>
        <img id="productImage" class="divider" src="" alt="" />
        <p class="product-card__price" id="productFinalPrice"></p>
        <p class="product__color" id="productColorName"></p>
        <p id="productDiscount"></p>
        <p class="product__description" id="productDescriptionHtmlSimple"></p>

        <div class="product-detail__actions">
          <button id="addToCart" data-id="">Add to Cart</button>
          <button id="addToWishlist" type="button">Add to Wishlist</button>
        </div>
      </section>

      <section
        class="recommended-products"
        id="recommendedProductsSection"
        hidden
      >
        <h2>Other Gear to Consider</h2>
        <ul
          class="product-list recommended-products__list"
          id="recommendedProductsList"
        ></ul>
      </section>

      <section class="product-comments" id="productCommentsSection">
        <h2>Customer Comments</h2>

        <form class="comment-form" id="commentForm">
          <label for="commentName">Name</label>
          <input type="text" id="commentName" name="commentName" maxlength="50" required />

          <label for="commentText">Comment</label>
          <textarea
            id="commentText"
            name="commentText"
            rows="4"
            maxlength="500"
            required
          ></textarea>

          <button type="submit">Add Comment</button>
        </form>

        <div class="comments-list" id="commentsList">
          <p class="comments-empty">No comments yet. Be the first to add one.</p>
        </div>
      </section>
    </main>

    <footer id="main-footer"></footer>
  </body>
</html>
