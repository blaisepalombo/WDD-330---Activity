<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Product Listing</title>
    <link rel="stylesheet" href="/css/style.css" />
    <script src="../js/product-list.js" type="module"></script>
  </head>
  <body>
    <header class="divider" id="main-header"></header>

    <div class="breadcrumb-wrapper">
      <p class="breadcrumb" id="breadcrumb"></p>
    </div>

    <main class="divider">
      <section class="products">
        <div class="products-header">
          <h2 class="page-title">Top Products</h2>

          <label class="sort-label" for="sortProducts">
            Sort by:
            <select id="sortProducts">
              <option value="default">Featured</option>
              <option value="name-asc">Name (A-Z)</option>
              <option value="name-desc">Name (Z-A)</option>
              <option value="price-asc">Price (Low to High)</option>
              <option value="price-desc">Price (High to Low)</option>
            </select>
          </label>
        </div>

        <ul class="product-list"></ul>
      </section>
    </main>

    <div
      class="quick-view-modal"
      id="quickViewModal"
      hidden
      aria-hidden="true"
    >
      <div
        class="quick-view-modal__dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="quickViewTitle"
      >
        <button
          class="quick-view-modal__close"
          id="quickViewClose"
          aria-label="Close quick view"
          type="button"
        >
          ×
        </button>
        <div class="quick-view-modal__content" id="quickViewContent"></div>
      </div>
    </div>

    <footer id="main-footer"></footer>
  </body>
</html>
