<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Checkout</title>
    <link rel="stylesheet" href="/css/style.css" />
    <script src="../js/checkout.js" type="module"></script>
  </head>

  <body>
    <header class="divider" id="main-header"></header>

    <main class="divider">
      <section class="products checkout-section">
        <h2>Review &amp; Place your Order</h2>

        <div class="checkout-grid">
          <form id="checkout-form" class="checkout-form">
            <fieldset>
              <legend>Customer Information</legend>

              <label for="fname">First Name</label>
              <input type="text" id="fname" name="fname" required />

              <label for="lname">Last Name</label>
              <input type="text" id="lname" name="lname" required />

              <label for="street">Street Address</label>
              <input type="text" id="street" name="street" required />

              <label for="city">City</label>
              <input type="text" id="city" name="city" required />

              <label for="state">State</label>
              <input
                type="text"
                id="state"
                name="state"
                minlength="2"
                maxlength="2"
                placeholder="ID"
                required
              />

              <label for="zip">Zip Code</label>
              <input
                type="text"
                id="zip"
                name="zip"
                inputmode="numeric"
                pattern="[0-9]{5}"
                placeholder="83440"
                required
              />
            </fieldset>

            <fieldset>
              <legend>Payment Details</legend>

              <label for="cardNumber">Card Number</label>
              <input
                type="text"
                id="cardNumber"
                name="cardNumber"
                inputmode="numeric"
                pattern="[0-9]{16}"
                placeholder="1234123412341234"
                required
              />

              <label for="expiration">Expiration</label>
              <input
                type="text"
                id="expiration"
                name="expiration"
                pattern="^(0[1-9]|1[0-2])\/([0-9]{2})$"
                placeholder="MM/YY"
                required
              />

              <label for="code">Security Code</label>
              <input
                type="text"
                id="code"
                name="code"
                inputmode="numeric"
                pattern="[0-9]{3,4}"
                placeholder="123"
                required
              />
            </fieldset>

            <button type="submit" id="checkoutSubmit">Place Order</button>
          </form>

          <section id="order-summary" class="order-summary">
            <h3>Order Summary</h3>
            <p>Item Subtotal: $<span id="item-subtotal">0.00</span></p>
            <p>Shipping: $<span id="shipping">0.00</span></p>
            <p>Tax: $<span id="tax">0.00</span></p>
            <p class="order-summary__total">
              Order Total: $<span id="order-total">0.00</span>
            </p>
          </section>
        </div>
      </section>
    </main>

    <footer id="main-footer"></footer>
  </body>
</html>
